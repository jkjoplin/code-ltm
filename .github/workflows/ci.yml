name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install Dependencies
        run: npm install --no-audit --no-fund

      - name: Check better-sqlite3 ABI
        id: abi_check
        continue-on-error: true
        run: node -e "require('better-sqlite3'); console.log('ABI_OK')"

      - name: Rebuild better-sqlite3 (if needed)
        if: steps.abi_check.outcome == 'failure'
        run: npm rebuild better-sqlite3

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run
